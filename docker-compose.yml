services:
  mimo-free-proxy:
    build: .
    container_name: mimo-free-proxy
    restart: unless-stopped
    ports:
      - "39173:39173"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-39173}
      PROXY_API_KEY: ${PROXY_API_KEY:?set PROXY_API_KEY in .env}
      UPSTREAM_BASE: ${UPSTREAM_BASE:-https://api.xiaomimimo.com}
      MAX_429_WAIT_MS: ${MAX_429_WAIT_MS:-180000}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-mimo-auto}
      MIMO_CLIENT: ${MIMO_CLIENT:-}
      CLIENT_FILE: ${CLIENT_FILE:-/data/client}
      JWT_FILE: ${JWT_FILE:-/data/jwt}
      GOMEMLIMIT: ${GOMEMLIMIT:-24MiB}
      GOGC: ${GOGC:-50}
    volumes:
      - mimo-free-proxy-data:/data

volumes:
  mimo-free-proxy-data:
